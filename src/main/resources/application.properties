# ===================================================================
# CONFIGURAÇÕES DA APLICAÇÃO
# ===================================================================
# Nome da aplicação usado em logs e microsserviços
spring.application.name=crud-app

# ===================================================================
# BANCO DE DADOS (PostgreSQL)
# ===================================================================
# URL de conexão com o banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/crud_db
# Usuário do banco de dados (Atualizado para o padrão)
spring.datasource.username=postgres
# Senha do banco de dados (Atualizado para o padrão)
spring.datasource.password=postgres

# ===================================================================
# JPA / HIBERNATE
# ===================================================================
# Apenas valida se o banco está correto (nunca use "update" em produção)
spring.jpa.hibernate.ddl-auto=validate
# Formata o SQL exibido no console para ficar legível
spring.jpa.properties.hibernate.format_sql=true
# Evita consultas extras ocultas (Lazy Initialization) fora das transações
spring.jpa.open-in-view=false

# ===================================================================
# FLYWAY (Controle de Versão do Banco)
# ===================================================================
# Ativa o Flyway para gerenciar as migrações
spring.flyway.enabled=true
# Pasta onde devem ficar os scripts SQL (ex: V1__criar_tabelas.sql)
spring.flyway.locations=classpath:db/migration

# ===================================================================
# SWAGGER / OPENAPI 3
# ===================================================================
# Define o caminho personalizado para a UI do Swagger se desejar (opcional)
springdoc.swagger-ui.path=/swagger-ui.html
# Ordena os endpoints por método HTTP (GET, POST, etc.) no painel visual
springdoc.swagger-ui.operationsSorter=method

# ===================================================================
# UPLOAD DE ARQUIVOS (Multipart)
# ===================================================================
# Ativa o suporte a uploads de arquivos
spring.servlet.multipart.enabled=true
# Limite máximo permitido para cada arquivo individual
spring.servlet.multipart.max-file-size=5MB
# Limite máximo para a requisição inteira (arquivos + dados do form)
spring.servlet.multipart.max-request-size=5MB

# ===================================================================
# CONFIGURAÇÕES DO SERVIDOR
# ===================================================================
# Porta onde o servidor Spring Boot vai rodar
server.port=8080
# Garante que a mensagem de erro customizada apareça na resposta da API
server.error.include-message=always

# ===================================================================
# CONFIGURAÇÕES PERSONALIZADAS DA APP (JWT e Uploads)
# ===================================================================
# Chave secreta do JWT (Busca da variável JWT_SECRET ou usa o padrão)
app.jwt.secret=${JWT_SECRET:troque-esta-chave-por-uma-secreta-de-256-bits-em-producao}
# Tempo de expiração do token (1 hora em milissegundos)
app.jwt.expiration-ms=3600000

# Diretório local para salvar arquivos enviados
app.upload.dir=${UPLOAD_DIR:uploads}
# URL pública utilizada pelo front-end para acessar os arquivos
app.upload.public-base-url=${PUBLIC_BASE_URL:http://localhost:8080/uploads}
